services:
  redis:
    image: redis:7-alpine
    container_name: magazin-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - redisdata:/data
    restart: unless-stopped

  app:
    build: .
    container_name: magazin-app
    network_mode: host
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/magazin
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-123}
      SPRING_DATA_REDIS_HOST: localhost
      APP_UPLOAD_DIR: /app/uploads
      APP_JWT_SECRET: ${JWT_SECRET:-dGhpc0lzQVZlcnlTZWNyZXRLZXlGb3JKd3RBdXRoZW50aWNhdGlvbkAxMjM0NTY3ODkw}
    volumes:
      - ./uploads:/app/uploads:z
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  redisdata:
