version: '3.8'
services:
  db:
    image: postgres:16
    container_name: magazin-db
    environment:
      POSTGRES_DB: magazin
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: magazin-redis
    ports:
      - "6379:6379"

volumes:
  pgdata:
